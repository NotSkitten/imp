<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Dynamic Accessibility Overrides */
        :root {
            --font-multiplier: 100%;
        }
        
        .app-root {
            font-size: var(--font-multiplier) !important;
        }
        
        /* High Contrast Helpers */
        body.theme-highcontrast * {
            border-color: #facc15 !important;
        }
        body.theme-highcontrast input, 
        body.theme-highcontrast select, 
        body.theme-highcontrast textarea, 
        body.theme-highcontrast button {
            border-width: 2px !important;
            border-color: #facc15 !important;
        }
        
        /* Custom Scrollbar for better UI */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800" id="bodyRoot">

    <div id="root" class="flex h-screen w-full app-root">
        <!-- App content injected here -->
    </div>

    <script>
        // Constants & Mock Data
        const AVAILABLE_INTERESTS = ["Coding", "Gaming", "Art", "Anime", "Food", "Sports", "Reading", "Movies", "Music", "Travel", "Photography", "Tech"];
        const AVAILABLE_SCHOOLS = ["Ngee Ann Polytechnic", "Singapore Polytechnic", "Temasek Polytechnic", "Nanyang Polytechnic", "Republic Polytechnic", "National University of Singapore", "Nanyang Technological University", "Singapore Management University"];
        const AVAILABLE_COURSES = ["Computer Science", "Information Technology", "Business Administration", "Design & Media", "Engineering", "Life Sciences", "Accounting"];
        
        const INITIAL_MOCK_USERS = [
            { id: 1, name: "Sarah J.", role: "Local Guide", year: "Year 2", school: "Ngee Ann Polytechnic", course: "Computer Science", interests: ["Anime", "Coding", "Gaming"], preference: "Online + IRL", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", achievementLevel: "Lvl 15 Elite Scholar" },
            { id: 2, name: "Kenji M.", role: "International", year: "Year 1", school: "Ngee Ann Polytechnic", course: "Business Administration", interests: ["Gaming", "Food", "Travel"], preference: "Online Only", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", achievementLevel: "Lvl 8 Explorer" },
        ];

        const LEARNING_COURSES = [
            { id: 'en', title: 'Singapore English (Singlish)', desc: 'Learn casual local phrases used in hawkers and everyday campus life.', level: 'Easy', icon: "🇸🇬", color: 'border-emerald-200 bg-emerald-50' },
            { id: 'zh', title: 'Basic Mandarin', desc: 'Everyday greetings, food ordering terms, and standard phrases.', level: 'Easy', icon: "🇨🇳", color: 'border-blue-200 bg-blue-50' },
            { id: 'ms', title: 'Basic Malay', desc: 'Conversational greetings, polite expressions, and everyday items.', level: 'Easy', icon: "🇲🇾", color: 'border-indigo-200 bg-indigo-50' },
            { id: 'ta', title: 'Basic Tamil', desc: 'Beautiful classical greetings and helpful conversational pointers.', level: 'Easy', icon: "🇮🇳", color: 'border-teal-200 bg-teal-50' },
            { id: 'c1', title: 'Campus Traditions', desc: 'Understanding university slang, CCAs, and hall culture.', level: 'Easy', icon: "🎓", color: 'border-purple-200 bg-purple-50' },
        ];

        const MULTI_DIFFICULTY_QUIZZES = {
            'en': {
                Easy: [
                    { q: "What does the Singlish term 'Makan' mean?", options: ["To Sleep", "To Eat", "To Run away", "To study together"], answer: "To Eat" },
                    { q: "When someone says 'Can or not?', what are they asking?", options: ["Is this permissible or possible?", "Are you feeling okay?", "Can you buy this?", "I am unable to do this."], answer: "Is this permissible or possible?" }
                ],
                Medium: [
                    { q: "What is the meaning of 'Chope' in Singapore?", options: ["To slice food", "To reserve a seat (often using tissue)", "To cancel an appointment", "To buy drinks for everyone"], answer: "To reserve a seat (often using tissue)" }
                ],
                Hard: [
                    { q: "What does 'Kiasu' mean in a student context?", options: ["Extremely relaxed about grades", "Fear of losing out or falling behind others", "A fast runner", "Generous classmate sharing answers"], answer: "Fear of losing out or falling behind others" }
                ]
            }
        };

        const CC_SESSION_KEY  = 'cc_html_session';
        const CC_ASSIGNMENTS_KEY = 'cc_html_assignments';
        const CC_SUBMISSIONS_KEY = 'cc_html_submissions';
        
        // IMPORTANT: Change this URL to your live backend (e.g., https://your-app-name.onrender.com) once deployed!
        const API_URL = 'https://imp-7jxc.onrender.com'; 

        const Store = {
            getSession: () => localStorage.getItem(CC_SESSION_KEY),
            setSession: (email) => localStorage.setItem(CC_SESSION_KEY, email),
            clearSession: () => localStorage.removeItem(CC_SESSION_KEY),
            
            // New Async API Calls
            getAccounts: async () => {
                try {
                    const response = await fetch(`${API_URL}/users`);
                    return await response.json();
                } catch (e) {
                    console.error("Backend not connected yet. Showing empty array.", e);
                    return [];
                }
            },
            createAccount: async (acc) => {
                try {
                    await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(acc)
                    });
                } catch (e) {
                    console.error("Failed to save to database.", e);
                }
            },
            
            getAssignments: () => {
                const data = localStorage.getItem(CC_ASSIGNMENTS_KEY);
                return data ? JSON.parse(data) : [
                    { id: 'assign_1', title: 'CS101: Week 4 Programming Lab', course: 'Computer Science', dueDate: '2026-07-20', description: 'Design and implement a basic binary search tree.', points: 20, createdAt: '2026-07-01' }
                ];
            },
            saveAssignments: (list) => localStorage.setItem(CC_ASSIGNMENTS_KEY, JSON.stringify(list)),
            getSubmissions: () => JSON.parse(localStorage.getItem(CC_SUBMISSIONS_KEY) || '[]'),
            saveSubmissions: (list) => localStorage.setItem(CC_SUBMISSIONS_KEY, JSON.stringify(list))
        };

        // Core State Object
        const state = {
            authState: 'login', // login, signup, app
            allUsers: [], // Live database users
            userRole: null,
            profile: null,
            currentEmail: '',
            activeTab: 'home',
            a11y: { fontSize: 'normal', theme: 'default', layout: 'standard' },
            interactionPref: 'both',
            
            // Auth Form State
            authForm: {
                errorMsg: '',
                successMsg: '',
                selectedInterests: []
            },

            // App Data State
            assignments: [],
            submissions: [],
            friends: [
                { name: "Sarah J.", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", school: "Ngee Ann Polytechnic", year: "Year 2", course: "Computer Science", level: 15, interests: ["Anime", "Coding", "Gaming"], achievementLevel: "Lvl 15 Elite Scholar" }
            ],
            connectedUserIds: [1],
            userGroups: [
                { id: 'group_tech', name: 'tech-innovators', description: 'Small study circle talking about AI & Web technologies.', members: ['Sarah J.', 'Kenji M.', 'Alex Tan'], isPrivate: true }
            ],
            events: [
                { id: 1, title: 'Silent Library Study Circle', desc: 'Silent study and group discussion preparation.', date: '2026-07-15', time: '14:00', location: 'NP Block 5 Library Quiet Zone', type: 'irl', members: ['Sarah J.', 'Kenji M.'] },
                { id: 2, title: 'Singlish Dialect Practicum Session', desc: 'Casual online conference practicing common campus slang.', date: '2026-07-18', time: '16:30', location: 'CampusConnect Online Chat #cultural-exchange', type: 'online', members: ['Elena R.'] }
            ],
            resourceFiles: [
                { id: 1, title: 'CS101 Week 4 Lecture Notes.pdf', subject: 'Computer Science', type: 'Notes', year: 2026, uploader: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', size: '2.4 MB', downloads: 84 }
            ],
            
            // UI Modals
            modal: null, 
            
            // Local Tab States
            connectTab: { search: '', school: 'All', course: 'All', role: 'All', interest: 'All' },
            channelsTab: { activeChannel: 'general-chat', input: '' },
            academicsTab: { selectedAssignment: null },
            playTab: { gameState: 'catalog', activeCourse: null, selectedDifficulty: 'Easy', quizQuestions: [], currentQIdx: 0, selectedAnswer: null, score: 0, completed: false },
            teacherTab: { editingIndex: null },
            
            messages: {
                'general-chat': [
                    { id: 1, username: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', role: 'Local Guide', content: 'Hey everyone! Welcome to our inclusive campus circle! 🙌', timestamp: 'Today at 3:15 PM' }
                ]
            }
        };

        const ThemeEngine = {
            getClasses: () => {
                let themeBg = 'bg-slate-50 text-slate-800';
                let cardClass = 'bg-white border border-slate-200 shadow-sm rounded-2xl';
                let textMuted = 'text-slate-500';
                let textPrimary = 'text-indigo-600';
                let brandGradient = 'from-indigo-600 to-violet-600';
                let activeTabBg = 'bg-indigo-50 text-indigo-700';
                let btnClass = 'bg-indigo-600 hover:bg-indigo-700 text-white';

                if (state.a11y.theme === 'highcontrast') {
                    themeBg = 'bg-slate-950 text-white theme-highcontrast';
                    cardClass = 'bg-slate-900 border-2 border-yellow-400 shadow-none rounded-2xl';
                    textMuted = 'text-slate-300';
                    textPrimary = 'text-yellow-400';
                    brandGradient = 'from-slate-900 to-slate-800';
                    activeTabBg = 'bg-yellow-400 text-slate-950';
                    btnClass = 'bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-bold border-2 border-white';
                } else if (state.a11y.theme === 'warm') {
                    themeBg = 'bg-amber-50 text-stone-900';
                    cardClass = 'bg-stone-100 border border-amber-200 shadow-sm rounded-2xl';
                    textMuted = 'text-stone-500';
                    textPrimary = 'text-amber-800';
                    brandGradient = 'from-amber-700 to-amber-900';
                    activeTabBg = 'bg-amber-200 text-stone-900';
                    btnClass = 'bg-amber-800 hover:bg-amber-900 text-white';
                } else if (state.a11y.theme === 'colorblind') {
                    themeBg = 'bg-sky-50 text-slate-950';
                    cardClass = 'bg-white border-2 border-sky-200 shadow-sm rounded-2xl';
                    textMuted = 'text-slate-600';
                    textPrimary = 'text-sky-700';
                    brandGradient = 'from-sky-700 to-orange-600';
                    activeTabBg = 'bg-orange-100 text-orange-950';
                    btnClass = 'bg-sky-700 hover:bg-sky-800 text-white';
                }

                return { themeBg, cardClass, textMuted, textPrimary, brandGradient, activeTabBg, btnClass };
            }
        };

        window.CC = {
            init: async () => {
                state.assignments = Store.getAssignments();
                state.submissions = Store.getSubmissions();
                
                // Fetch live users from the database
                state.allUsers = await Store.getAccounts();
                
                const email = Store.getSession();
                if (email) {
                    const matched = state.allUsers.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (matched) {
                        state.currentEmail = email;
                        state.profile = matched.profile;
                        state.userRole = matched.role;
                        state.authState = 'app';
                    }
                }
                CC.render();
            },
            
            render: () => {
                const root = document.getElementById('root');
                const bodyRoot = document.getElementById('bodyRoot');
                const th = ThemeEngine.getClasses();
                
                bodyRoot.className = th.themeBg;
                
                let fontMultiplier = '100%';
                if (state.a11y.fontSize === 'large') fontMultiplier = '115%';
                if (state.a11y.fontSize === 'xl') fontMultiplier = '130%';
                document.documentElement.style.setProperty('--font-multiplier', fontMultiplier);

                if (state.authState === 'login' || state.authState === 'signup') {
                    root.innerHTML = Renderers.Auth();
                } else {
                    root.innerHTML = `
                        ${Renderers.Sidebar()}
                        <main class="flex-1 ${state.activeTab === 'channels' ? 'overflow-hidden flex flex-col' : 'overflow-y-auto'} bg-transparent">
                            ${Renderers.ActiveTab()}
                        </main>
                        ${Renderers.Modals()}
                    `;
                }
            },

            // Navigation & Generic Actions
            setAuthState: (v) => { state.authState = v; state.authForm.errorMsg = ''; state.authForm.successMsg = ''; CC.render(); },
            setTab: (t) => { state.activeTab = t; CC.render(); },
            setModal: (m) => { state.modal = m; CC.render(); },
            setInteractionPref: (p) => { state.interactionPref = p; CC.render(); },
            
            // Auth Handlers
            toggleAuthInterest: (interest) => {
                const idx = state.authForm.selectedInterests.indexOf(interest);
                if (idx === -1) state.authForm.selectedInterests.push(interest);
                else state.authForm.selectedInterests.splice(idx, 1);
                CC.render();
            },
            handleAuthSubmit: async (e) => {
                e.preventDefault();
                state.authForm.errorMsg = '';
                const email = document.getElementById('authEmail').value;
                const password = document.getElementById('authPassword').value;
                
                if(!email || !password) return;
                
                // Fetch fresh accounts to check for duplicates
                const accounts = await Store.getAccounts();

                if (state.authState === 'login') {
                    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (!acc) {
                        state.authForm.errorMsg = 'No registered account found. Sign Up first!';
                        CC.render();
                        return;
                    }
                    if (acc.password !== password) {
                        state.authForm.errorMsg = 'Invalid password.';
                        CC.render();
                        return;
                    }
                    state.currentEmail = email;
                    Store.setSession(email);
                    state.profile = acc.profile;
                    state.userRole = acc.role;
                    state.authState = 'app';
                    state.activeTab = 'home';
                    CC.render();
                } else {
                    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (acc) {
                        state.authForm.errorMsg = 'Email already in use.';
                        CC.render();
                        return;
                    }
                    
                    const name = document.getElementById('authName').value || 'Student Guide';
                    const role = document.getElementById('authRole').value;
                    const studentType = document.getElementById('authStudentType')?.value || 'Local Guide';
                    const school = document.getElementById('authSchool').value;
                    const course = document.getElementById('authCourse').value;
                    const year = document.getElementById('authYear').value;
                    const avatar = document.getElementById('authAvatar').value || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150';

                    const newProfile = {
                        name, displayName: name, school, eduLevel: role === 'student' ? 'Diploma' : 'Faculty',
                        degree: course, year, interests: state.authForm.selectedInterests.length ? state.authForm.selectedInterests : ['Coding'],
                        role: role === 'student' ? studentType : 'Local Guide', achievementLevel: 'Lvl 1 Rookie', xp: 120, avatar
                    };

                    const newAccount = { email, password, profile: newProfile, role, id: Date.now() };
                    
                    // Save to database
                    await Store.createAccount(newAccount);
                    
                    state.authForm.successMsg = 'Account configured! Loading...';
                    CC.render();
                    
                    setTimeout(async () => {
                        // Refresh global user list
                        state.allUsers = await Store.getAccounts();
                        
                        state.currentEmail = email;
                        Store.setSession(email);
                        state.profile = newProfile;
                        state.userRole = role;
                        state.authState = 'app';
                        state.activeTab = 'home';
                        CC.render();
                    }, 1000);
                }
            },
            logout: () => {
                Store.clearSession();
                state.authState = 'login';
                state.userRole = null;
                state.profile = null;
                CC.render();
            },

            addXP: (pts) => {
                state.profile.xp += pts;
                if(state.profile.xp >= 150 && state.profile.xp < 300) state.profile.achievementLevel = "Lvl 2 Advanced Learner";
                if(state.profile.xp >= 300) state.profile.achievementLevel = "Lvl 3 Active Contributor";
                // Note: Updating remote XP requires a PUT route on the backend which is outside this scope.
            },
            
            connectFilterUpdate: () => {
                state.connectTab.search = document.getElementById('filterSearch').value;
                state.connectTab.school = document.getElementById('filterSchool').value;
                state.connectTab.course = document.getElementById('filterCourse').value;
                state.connectTab.role = document.getElementById('filterRole').value;
                state.connectTab.interest = document.getElementById('filterInterest').value;
                CC.render();
            },
            
            connectBuddy: (id) => {
                if(!state.connectedUserIds.includes(id)) {
                    state.connectedUserIds.push(id);
                    const acc = state.allUsers.find(u => u.id === id);
                    if(acc) state.friends.push(acc.profile);
                    CC.render();
                }
            },

            handleCreateEvent: (e) => {
                e.preventDefault();
                const title = document.getElementById('evTitle').value;
                if(!title) return;
                state.events.push({
                    id: Date.now(), title,
                    desc: document.getElementById('evDesc').value,
                    date: document.getElementById('evDate').value,
                    time: document.getElementById('evTime').value,
                    location: document.getElementById('evLoc').value,
                    type: document.getElementById('evType').value,
                    members: [state.profile.name]
                });
                state.modal = 'events'; 
                CC.render();
            },

            handleCreateGroup: (e) => {
                e.preventDefault();
                const title = document.getElementById('grpName').value;
                if(!title) return;
                
                const checkboxes = document.querySelectorAll('.grp-member-checkbox:checked');
                const members = [state.profile.name];
                checkboxes.forEach(cb => members.push(cb.value));

                const grpId = `group_${Date.now()}`;
                state.userGroups.push({
                    id: grpId,
                    name: title.toLowerCase().replace(/\s+/g, '-'),
                    description: document.getElementById('grpDesc').value,
                    members, isPrivate: true
                });
                
                state.modal = null;
                state.activeTab = 'channels';
                state.channelsTab.activeChannel = grpId;
                CC.render();
            },

            sendMessage: () => {
                const inp = document.getElementById('chatInput');
                if(!inp || !inp.value.trim()) return;
                
                const ch = state.channelsTab.activeChannel;
                if(!state.messages[ch]) state.messages[ch] = [];
                
                state.messages[ch].push({
                    id: Date.now(),
                    username: `${state.profile.name} (You)`,
                    avatar: state.profile.avatar,
                    role: state.profile.role,
                    content: inp.value,
                    timestamp: 'Just now'
                });
                CC.render();
            },

            selectAssignment: (id) => {
                state.academicsTab.selectedAssignment = state.assignments.find(a => a.id === id);
                CC.render();
            },
            
            submitAssignment: (e) => {
                e.preventDefault();
                const sol = document.getElementById('solText').value;
                if(!sol) return;
                
                const assignId = state.academicsTab.selectedAssignment.id;
                state.submissions = state.submissions.filter(s => !(s.assignmentId === assignId && s.studentEmail === state.currentEmail));
                
                state.submissions.push({
                    assignmentId: assignId, studentEmail: state.currentEmail,
                    studentName: state.profile.name, solutionText: sol, submittedAt: new Date().toLocaleDateString()
                });
                Store.saveSubmissions(state.submissions);
                
                alert('Assessment submitted successfully!');
                state.academicsTab.selectedAssignment = null;
                CC.render();
            },

            // Play / Quizzes
            startQuiz: (courseId) => {
                const c = LEARNING_COURSES.find(x => x.id === courseId);
                state.playTab.activeCourse = c;
                state.playTab.selectedDifficulty = state.profile.xp >= 300 ? 'Hard' : state.profile.xp >= 150 ? 'Medium' : 'Easy';
                state.playTab.quizQuestions = MULTI_DIFFICULTY_QUIZZES[courseId]?.[state.playTab.selectedDifficulty] || MULTI_DIFFICULTY_QUIZZES['en']['Easy'];
                state.playTab.currentQIdx = 0;
                state.playTab.selectedAnswer = null;
                state.playTab.score = 0;
                state.playTab.completed = false;
                state.playTab.gameState = 'quiz';
                CC.render();
            },
            selectAnswer: (opt) => {
                if(state.playTab.selectedAnswer !== null) return;
                state.playTab.selectedAnswer = opt;
                if(opt === state.playTab.quizQuestions[state.playTab.currentQIdx].answer) {
                    state.playTab.score++;
                }
                CC.render();
            },
            nextQuestion: () => {
                if(state.playTab.currentQIdx < state.playTab.quizQuestions.length - 1) {
                    state.playTab.currentQIdx++;
                    state.playTab.selectedAnswer = null;
                } else {
                    state.playTab.completed = true;
                    const baseXP = state.playTab.selectedDifficulty === 'Easy' ? 10 : state.playTab.selectedDifficulty === 'Medium' ? 20 : 35;
                    CC.addXP(state.playTab.score * baseXP);
                }
                CC.render();
            },

            // Teacher
            setTeacherEditing: (idx) => { state.teacherTab.editingIndex = idx; CC.render(); },
            saveTeacherGrade: (idx) => {
                const grd = document.getElementById(`gradeInp_${idx}`).value;
                const fdb = document.getElementById(`feedInp_${idx}`).value;
                state.submissions[idx].grade = grd;
                state.submissions[idx].feedback = fdb;
                Store.saveSubmissions(state.submissions);
                state.teacherTab.editingIndex = null;
                CC.render();
            }
        };

        const Renderers = {
            Auth: () => {
                const m = state.authState;
                const err = state.authForm.errorMsg ? `<div class="bg-rose-50 border border-rose-200 text-rose-700 text-xs p-3.5 rounded-xl flex items-center gap-2 mb-4"><i class="fa-solid fa-circle-exclamation"></i><b>${state.authForm.errorMsg}</b></div>` : '';
                const suc = state.authForm.successMsg ? `<div class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs p-3.5 rounded-xl flex items-center gap-2 mb-4"><i class="fa-solid fa-check-circle"></i><b>${state.authForm.successMsg}</b></div>` : '';
                
                let signupFields = '';
                if(m === 'signup') {
                    signupFields = `
                        <div class="border-t border-slate-100 pt-4 space-y-4 mt-4">
                            <p class="font-bold text-indigo-700 text-sm mb-2">Configure Profile Details</p>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Full Name</label>
                                <input required id="authName" type="text" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="e.g. Alex Tan">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Registering as</label>
                                    <select id="authRole" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm" onchange="document.getElementById('studentTypeWrap').style.display = this.value === 'student' ? 'block' : 'none'">
                                        <option value="student">Student</option>
                                        <option value="teacher">Teacher / Faculty</option>
                                    </select>
                                </div>
                                <div id="studentTypeWrap">
                                    <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Status</label>
                                    <select id="authStudentType" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm">
                                        <option value="Local Guide">Local Student (Guide)</option>
                                        <option value="International">International Student</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">School</label>
                                    <select id="authSchool" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm">
                                        ${AVAILABLE_SCHOOLS.map(s => `<option value="${s}">${s}</option>`).join('')}
                                    </select>
                                </div>
                                <div>

                                    <div class="${th.cardClass} ${c.color} p-5 flex flex-col justify-between hover:shadow-md transition-all">
                                        <div class="mb-4">
                                            <div class="text-3xl mb-3">${c.icon}</div>
                                            <h3 class="font-extrabold text-sm text-slate-800">${c.title}</h3>
                                            <p class="text-xs text-slate-500 mt-1">${c.desc}</p>
                                        </div>
                                        <button onclick="CC.startQuiz('${c.id}')" class="text-xs py-2 w-full rounded-xl font-bold ${th.btnClass}">Start Quiz</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    } else {
                        const q = pt.quizQuestions[pt.currentQIdx];
                        return `
                        <div class="p-8 max-w-5xl mx-auto pb-20 text-slate-800">
                            <div class="max-w-xl mx-auto bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
                                <div class="flex justify-between border-b border-slate-100 pb-3 mb-4">
                                    <button onclick="state.playTab.gameState='catalog'; CC.render()" class="p-1"><i class="fa-solid fa-arrow-left"></i></button>
                                    <span class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded">${pt.selectedDifficulty}</span>
                                </div>
                                ${!pt.completed && q ? `
                                    <div class="space-y-4">
                                        <div class="flex justify-between text-xs text-slate-400 font-bold">
                                            <span>Question ${pt.currentQIdx + 1} of ${pt.quizQuestions.length}</span>
                                        </div>
                                        <h3 class="font-bold text-sm py-2">${q.q}</h3>
                                        <div class="space-y-2">
                                            ${q.options.map(opt => {
                                                const sel = pt.selectedAnswer === opt;
                                                const correct = opt === q.answer;
                                                let cls = 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-800';
                                                if(pt.selectedAnswer) {
                                                    if(correct) cls = 'bg-emerald-100 border-emerald-300 text-emerald-800 font-bold';
                                                    else if(sel) cls = 'bg-rose-100 border-rose-300 text-rose-800';
                                                }
                                                return `<button onclick="CC.selectAnswer('${opt}')" class="w-full text-left p-3 rounded-xl border text-xs transition-all ${cls}">${opt}</button>`;
                                            }).join('')}
                                        </div>
                                        ${pt.selectedAnswer ? `
                                            <button onclick="CC.nextQuestion()" class="w-full bg-slate-900 text-white text-xs font-bold py-2.5 rounded-xl mt-4">Next Question</button>
                                        ` : ''}
                                    </div>
                                ` : pt.completed ? `
                                    <div class="text-center py-6">
                                        <div class="text-4xl text-emerald-500 mb-3"><i class="fa-solid fa-certificate"></i></div>
                                        <h3 class="text-lg font-extrabold">Quiz Completed!</h3>
                                        <p class="text-xs text-slate-500 my-2">Score: ${pt.score} / ${pt.quizQuestions.length}</p>
                                        <button onclick="state.playTab.gameState='catalog'; CC.render()" class="mt-4 px-6 py-2 rounded-xl text-xs font-bold ${th.btnClass}">Back to Topics</button>
                                    </div>
                                ` : '<p>No questions found.</p>'}
                            </div>
                        </div>`;
                    }
                },

                Resources: () => `<div class="p-8 pb-20 text-slate-800"><h2 class="text-2xl font-bold">Resources</h2><p class="text-sm text-slate-500">File library (stubbed in Vanilla JS version).</p></div>`,
                Achievements: () => `<div class="p-8 pb-20 text-slate-800"><h2 class="text-2xl font-bold">Achievements</h2><p class="text-sm text-slate-500">Current XP: ${state.profile.xp}</p></div>`,
                
                Settings: () => {
                    const th = ThemeEngine.getClasses();
                    return `
                    <div class="p-8 max-w-3xl mx-auto space-y-8 text-slate-800 pb-20">
                        <h2 class="text-2xl font-bold"><i class="fa-solid fa-eye text-indigo-600"></i> Settings</h2>
                        <section class="${th.cardClass} p-6">
                            <h3 class="font-extrabold text-sm mb-4">Font Size</h3>
                            <div class="flex gap-3">
                                ${['normal', 'large', 'xl'].map(s => `
                                    <button onclick="state.a11y.fontSize='${s}'; CC.render()" class="flex-1 py-2.5 rounded-xl border text-xs font-bold ${state.a11y.fontSize===s?'bg-indigo-600 text-white border-indigo-600':'bg-white text-slate-600'}">${s}</button>
                                `).join('')}
                            </div>
                        </section>
                        <section class="${th.cardClass} p-6">
                            <h3 class="font-extrabold text-sm mb-4">Color Palette</h3>
                            <div class="grid grid-cols-2 gap-4">
                                ${[{id:'default',n:'Default'},{id:'highcontrast',n:'High Contrast'},{id:'warm',n:'Warm'},{id:'colorblind',n:'Colorblind'}].map(t => `
                                    <button onclick="state.a11y.theme='${t.id}'; CC.render()" class="p-3.5 rounded-xl border font-bold text-xs ${state.a11y.theme===t.id?'border-indigo-500 bg-slate-50':'border-slate-200 bg-white'}">${t.n}</button>
                                `).join('')}
                            </div>
                        </section>
                    </div>`;
                },

                TeacherDashboard: () => {
                    const th = ThemeEngine.getClasses();
                    return `
                    <div class="p-8 max-w-5xl mx-auto space-y-6 text-slate-800 pb-20">
                        <h2 class="text-2xl font-bold"><i class="fa-solid fa-graduation-cap text-indigo-600"></i> Lecturer Dashboard</h2>
                        <div class="space-y-4">
                            ${state.submissions.map((sub, idx) => `
                                <div class="${th.cardClass} p-5">
                                    <p class="text-xs font-black text-indigo-700 mb-2">Student: ${sub.studentName}</p>
                                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-xs mb-3">${sub.solutionText}</div>
                                    ${sub.grade ? `
                                        <div class="bg-emerald-50 text-emerald-800 p-2 rounded text-xs font-bold">Grade: ${sub.grade} | Feedback: ${sub.feedback}</div>
                                    ` : state.teacherTab.editingIndex === idx ? `
                                        <div class="flex gap-2">
                                            <input id="gradeInp_${idx}" type="text" placeholder="Grade" class="px-2 py-1 border rounded text-xs">
                                            <input id="feedInp_${idx}" type="text" placeholder="Feedback" class="flex-1 px-2 py-1 border rounded text-xs">
                                            <button onclick="CC.saveTeacherGrade(${idx})" class="bg-indigo-600 text-white px-3 py-1 text-xs rounded font-bold">Save</button>
                                        </div>
                                    ` : `
                                        <button onclick="CC.setTeacherEditing(${idx})" class="${th.btnClass} text-xs px-3 py-1.5 rounded font-bold">Grade</button>
                                    `}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                },
                TeacherAssign: () => `<div class="p-8 pb-20 text-slate-800"><h2 class="text-2xl font-bold">Manage Homework</h2><p>Use local state to assign new tasks.</p></div>`
            },

            Modals: () => {
                if(!state.modal) return '';
                const close = () => { state.modal = null; CC.render(); };
                
                let content = '';
                if(state.modal === 'friends') {
                    content = `
                        <div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-3">
                            <h3 class="text-lg font-black text-slate-800">My Buddies</h3>
                            <button onclick="CC.setModal(null)"><i class="fa-solid fa-xmark text-slate-500"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${state.friends.map(f => `
                                <div class="border border-slate-200 p-4 rounded-2xl bg-slate-50 flex items-center gap-3">
                                    <img src="${f.avatar}" class="w-12 h-12 rounded-full border border-indigo-200 object-cover">
                                    <div><p class="font-extrabold text-sm text-slate-800">${f.name}</p><p class="text-[10px] text-slate-500">${f.school}</p></div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if(state.modal === 'events') {
                    content = `
                        <div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-3">
                            <h3 class="text-lg font-black text-slate-800">Events</h3>
                            <button onclick="CC.setModal(null)"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="space-y-3 mb-4">
                            ${state.events.map(e => `
                                <div class="border border-slate-200 p-4 rounded-2xl bg-slate-50 text-slate-800">
                                    <h4 class="font-bold text-sm">${e.title}</h4>
                                    <p class="text-xs text-slate-500 my-1">${e.desc}</p>
                                    <p class="text-[11px]">📍 ${e.location} | 🕒 ${e.time}</p>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="CC.setModal('addEvent')" class="bg-indigo-600 text-white w-full py-2 rounded-xl text-xs font-bold">+ Create Event</button>
                    `;
                } else if(state.modal === 'addEvent') {
                    content = `
                        <h3 class="text-lg font-black text-slate-800 mb-4">New Event</h3>
                        <form onsubmit="CC.handleCreateEvent(event)" class="space-y-3">
                            <input id="evTitle" required type="text" placeholder="Title" class="w-full p-2 border rounded-xl text-xs">
                            <textarea id="evDesc" placeholder="Description" class="w-full p-2 border rounded-xl text-xs"></textarea>
                            <input id="evLoc" required type="text" placeholder="Location" class="w-full p-2 border rounded-xl text-xs">
                            <div class="grid grid-cols-3 gap-2">
                                <input id="evDate" type="date" class="p-2 border rounded-xl text-xs">
                                <input id="evTime" type="time" class="p-2 border rounded-xl text-xs">
                                <select id="evType" class="p-2 border rounded-xl text-xs"><option value="irl">IRL</option><option value="online">Online</option></select>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button type="button" onclick="CC.setModal('events')" class="flex-1 py-2 border rounded-xl text-xs font-bold">Cancel</button>
                                <button type="submit" class="flex-1 bg-indigo-600 text-white rounded-xl text-xs font-bold">Save</button>
                            </div>
                        </form>
                    `;
                } else if(state.modal === 'addGroup') {
                    // Pulls from allUsers for group creation options
                    content = `
                        <h3 class="text-lg font-black text-slate-800 mb-4">New Group</h3>
                        <form onsubmit="CC.handleCreateGroup(event)" class="space-y-3">
                            <input id="grpName" required type="text" placeholder="Group Name (No Spaces)" class="w-full p-2 border rounded-xl text-xs bg-slate-50">
                            <textarea id="grpDesc" placeholder="Description" class="w-full p-2 border rounded-xl text-xs bg-slate-50"></textarea>
                            <div class="max-h-32 overflow-y-auto p-2 border rounded-xl bg-slate-50 space-y-1">
                                ${state.allUsers.map(u => `
                                    <label class="flex items-center gap-2 text-xs text-slate-700 cursor-pointer p-1">
                                        <input type="checkbox" value="${u.profile.name}" class="grp-member-checkbox rounded"> ${u.profile.name}
                                    </label>
                                `).join('')}
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button type="button" onclick="CC.setModal(null)" class="flex-1 py-2 border rounded-xl text-xs font-bold">Cancel</button>
                                <button type="submit" class="flex-1 bg-indigo-600 text-white rounded-xl text-xs font-bold">Create Group</button>
                            </div>
                        </form>
                    `;
                }

                return `
                <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div class="bg-white rounded-3xl shadow-2xl p-7 max-w-2xl w-full text-slate-800 max-h-[85vh] overflow-y-auto">
                        ${content}
                    </div>
                </div>`;
            }
        };

        window.onload = () => {
            CC.init();
        };
    </script>
</body>
</html>
