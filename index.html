<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* Dynamic Accessibility Overrides */
        :root {
            --font-multiplier: 100%;
        }
        
        .app-root {
            font-size: var(--font-multiplier) !important;
        }
        
        /* High Contrast Helpers */
        body.theme-highcontrast * {
            border-color: #facc15 !important;
        }
        body.theme-highcontrast input, 
        body.theme-highcontrast select, 
        body.theme-highcontrast textarea, 
        body.theme-highcontrast button {
            border-width: 2px !important;
            border-color: #facc15 !important;
        }
        
        /* Custom Scrollbar for better UI */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800" id="bodyRoot">

    <div id="root" class="flex h-screen w-full app-root">
        <!-- App content injected here -->
    </div>

    <script>
        // Constants & Mock Data
        const AVAILABLE_INTERESTS = ["Coding", "Gaming", "Art", "Anime", "Food", "Sports", "Reading", "Movies", "Music", "Travel", "Photography", "Tech"];
        const AVAILABLE_SCHOOLS = ["Ngee Ann Polytechnic", "Singapore Polytechnic", "Temasek Polytechnic", "Nanyang Polytechnic", "Republic Polytechnic", "National University of Singapore", "Nanyang Technological University", "Singapore Management University"];
        const AVAILABLE_COURSES = ["Computer Science", "Information Technology", "Business Administration", "Design & Media", "Engineering", "Life Sciences", "Accounting"];
        
        const INITIAL_MOCK_USERS = [
            { id: 1, name: "Sarah J.", role: "Local Guide", year: "Year 2", school: "Ngee Ann Polytechnic", course: "Computer Science", interests: ["Anime", "Coding", "Gaming"], preference: "Online + IRL", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", achievementLevel: "Lvl 15 Elite Scholar" },
            { id: 2, name: "Kenji M.", role: "International", year: "Year 1", school: "Ngee Ann Polytechnic", course: "Business Administration", interests: ["Gaming", "Food", "Travel"], preference: "Online Only", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", achievementLevel: "Lvl 8 Explorer" },
        ];

        const CC_SESSION_KEY  = 'cc_html_session';
        const CC_ASSIGNMENTS_KEY = 'cc_html_assignments';
        const CC_SUBMISSIONS_KEY = 'cc_html_submissions';
        
        const API_URL = 'https://imp-7jxc.onrender.com'; 

        const Store = {
            getSession: () => localStorage.getItem(CC_SESSION_KEY),
            setSession: (email) => localStorage.setItem(CC_SESSION_KEY, email),
            clearSession: () => localStorage.removeItem(CC_SESSION_KEY),
            
            getAccounts: async () => {
                try {
                    const response = await fetch(`${API_URL}/users`);
                    return await response.json();
                } catch (e) {
                    console.error("Backend not connected yet. Showing empty array.", e);
                    return [];
                }
            },
            createAccount: async (acc) => {
                try {
                    await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(acc)
                    });
                } catch (e) {
                    console.error("Failed to save to database.", e);
                }
            },
            
            getAssignments: () => {
                const data = localStorage.getItem(CC_ASSIGNMENTS_KEY);
                return data ? JSON.parse(data) : [
                    { id: 'assign_1', title: 'CS101: Week 4 Programming Lab', course: 'Computer Science', dueDate: '2026-07-20', description: 'Design and implement a basic binary search tree.', points: 20, createdAt: '2026-07-01', collaborators: { needHelp: ['Kenji M.'], canHelp: [], studyBuddies: ['Sarah J.'] } },
                    { id: 'assign_2', title: 'MATH201: Calculus Midterm Prep', course: 'Mathematics', dueDate: '2026-07-18', description: 'Past year paper review and discussion.', points: 15, createdAt: '2026-07-10', collaborators: { needHelp: [], canHelp: ['Sarah J.'], studyBuddies: [] } }
                ];
            },
            saveAssignments: (list) => localStorage.setItem(CC_ASSIGNMENTS_KEY, JSON.stringify(list)),
            getSubmissions: () => JSON.parse(localStorage.getItem(CC_SUBMISSIONS_KEY) || '[]'),
            saveSubmissions: (list) => localStorage.setItem(CC_SUBMISSIONS_KEY, JSON.stringify(list))
        };

        // Core State Object
        const state = {
            authState: 'login', // login, signup, app
            allUsers: [], 
            userRole: null,
            profile: null,
            currentEmail: '',
            activeTab: 'home',
            a11y: { fontSize: 'normal', theme: 'default', layout: 'standard' },
            interactionPref: 'both',
            
            // Auth Form State
            authForm: { errorMsg: '', successMsg: '', selectedInterests: [] },

            // App Data State
            assignments: [],
            submissions: [],
            friends: [
                { name: "Sarah J.", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", school: "Ngee Ann Polytechnic", year: "Year 2", course: "Computer Science", level: 15, interests: ["Anime", "Coding", "Gaming"], achievementLevel: "Lvl 15 Elite Scholar" }
            ],
            connectedUserIds: [1],
            spaces: [
                { id: 'sp_cs101', name: 'cs101-lab-help', type: 'module', desc: 'Temporary study group for Week 4 Binary Trees assignment.', members: ['Sarah J.', 'Kenji M.'], expiresAt: '2026-07-20', status: 'active', tags: ['Computer Science'] },
                { id: 'sp_anime', name: 'anime-watch-party', type: 'hobby', desc: 'Discussing the summer anime drops! Auto-archives at end of month.', members: ['Sarah J.'], expiresAt: '2026-08-30', status: 'active', tags: ['Anime'] },
                { id: 'sp_hack', name: 'hackathon-team-finder', type: 'event', desc: 'Looking for developers for the upcoming campus hackathon.', members: ['Kenji M.'], expiresAt: '2026-07-18', status: 'active', tags: ['Coding', 'Tech'] },
                { id: 'sp_math', name: 'math-midterms-prep', type: 'module', desc: 'Past year papers discussion.', members: ['Sarah J.'], expiresAt: '2026-06-15', status: 'archived', tags: [] }
            ],
            events: [
                { id: 1, title: 'Silent Library Study Circle', desc: 'Silent study and group discussion preparation.', date: '2026-07-15', time: '14:00', location: 'NP Block 5 Library Quiet Zone', type: 'irl', members: ['Sarah J.', 'Kenji M.'] }
            ],
            
            // Knowledge Exchange Hub Mock Data
            resourceFiles: [
                { id: 'r1', title: 'CS101 Binary Trees Cheat Sheet', topic: 'Computer Science', type: 'PDF', uploader: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', description: 'Visual guide to tree traversals and balancing. Helped me ace the midterms!', upvotes: 42, trusted: true },
                { id: 'r2', title: 'Macroeconomics Chapter 1-5 Summary', topic: 'Business Administration', type: 'Notes', uploader: 'Kenji M.', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', description: 'Simplified breakdowns of supply and demand curves with real-world examples.', upvotes: 8, trusted: false },
                { id: 'r3', title: 'Figma Auto-Layout Mastery', topic: 'Design & Media', type: 'Link', uploader: 'Elena R.', avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150', description: 'A quick guide to making your UI prototypes scale flawlessly.', upvotes: 115, trusted: true }
            ],
            
            // Culture Exchange Mock Data
            exchangePosts: [
                { id: 101, authorName: "Sarah J.", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", title: "Teach me basic Japanese! 🇯🇵", type: "request", topic: "Language", description: "Going on exchange to Tokyo next semester. Need to survive ordering food and asking for directions!", interestedCount: 3, isInterested: false },
                { id: 102, authorName: "Kenji M.", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", title: "Singlish 101 Survival Guide 🇸🇬", type: "offer", topic: "Culture", description: "I've mastered the art of ordering kopi. Let me teach you the difference between 'Kopi C' and 'Kopi O Kosong'!", interestedCount: 8, isInterested: false },
                { id: 103, authorName: "Elena R.", avatar: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150", title: "Spanish Tapas Night 🇪🇸", type: "session", topic: "Food", description: "Hosting a small gathering in Hall 4 to share authentic tapas recipes and practice conversational Spanish.", interestedCount: 5, date: "2026-07-20", time: "18:00", isInterested: false }
            ],
            
            // UI Modals
            modal: null, 
            
            // Local Tab States
            connectTab: { search: '', school: 'All', course: 'All', role: 'All', interest: 'All' },
            spacesTab: { activeSpaceId: 'discover' },
            academicsTab: { selectedAssignment: null },
            exchangeTab: { filter: 'all' },
            resourcesTab: { search: '', topic: 'All' },
            teacherTab: { editingIndex: null },
            icebreakerTab: { activePromptId: 'ib_1', commentingOn: null },
            
            icebreakers: [
                {
                    id: 'ib_1', date: 'Today', prompt: "What is a food from your culture everyone must try at least once?",
                    replies: [
                        { id: 'r1', authorName: 'Kenji M.', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', content: 'You have to try authentic Takoyaki! The ones at the local night markets here are good, but nothing beats the street food in Osaka.', likes: 12, comments: [] },
                        { id: 'r2', authorName: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', content: 'Kaya Toast with half-boiled eggs. It is the ultimate breakfast comfort food. Dip the toast in the egg!', likes: 24, comments: [{ authorName: 'Kenji M.', content: 'Tried this yesterday, it was amazing!!' }] }
                    ]
                },
                {
                    id: 'ib_2', date: 'Yesterday', prompt: "Share a hidden study spot on campus.",
                    replies: [
                        { id: 'r3', authorName: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', content: 'Block 51, Level 4. There are these tucked-away benches with power plugs. Just don\'t tell too many people or I\'ll lose my spot! 🤫', likes: 8, comments: [] }
                    ]
                }
            ],
            
            messages: {
                'sp_cs101': [
                    { id: 1, username: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', role: 'Local Guide', content: 'Anyone stuck on the binary tree insertion logic? 😭', timestamp: 'Today at 3:15 PM' },
                    { id: 2, username: 'Kenji M.', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', role: 'International', content: 'Yeah, I keep getting a segfault. Let us compare notes!', timestamp: 'Today at 3:18 PM' }
                ],
                'sp_math': [
                    { id: 3, username: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', role: 'Local Guide', content: 'Good luck on the midterms everyone! Thanks for studying together.', timestamp: 'Jun 14, 2026' }
                ]
            }
        };

        const ThemeEngine = {
            getClasses: () => {
                let themeBg = 'bg-slate-50 text-slate-800';
                let cardClass = 'bg-white border border-slate-200 shadow-sm rounded-2xl';
                let textMuted = 'text-slate-500';
                let textPrimary = 'text-indigo-600';
                let brandGradient = 'from-indigo-600 to-violet-600';
                let activeTabBg = 'bg-indigo-50 text-indigo-700';
                let btnClass = 'bg-indigo-600 hover:bg-indigo-700 text-white';

                if (state.a11y.theme === 'highcontrast') {
                    themeBg = 'bg-slate-950 text-white theme-highcontrast';
                    cardClass = 'bg-slate-900 border-2 border-yellow-400 shadow-none rounded-2xl';
                    textMuted = 'text-slate-300';
                    textPrimary = 'text-yellow-400';
                    brandGradient = 'from-slate-900 to-slate-800';
                    activeTabBg = 'bg-yellow-400 text-slate-950';
                    btnClass = 'bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-bold border-2 border-white';
                } else if (state.a11y.theme === 'warm') {
                    themeBg = 'bg-amber-50 text-stone-900';
                    cardClass = 'bg-stone-100 border border-amber-200 shadow-sm rounded-2xl';
                    textMuted = 'text-stone-500';
                    textPrimary = 'text-amber-800';
                    brandGradient = 'from-amber-700 to-amber-900';
                    activeTabBg = 'bg-amber-200 text-stone-900';
                    btnClass = 'bg-amber-800 hover:bg-amber-900 text-white';
                } else if (state.a11y.theme === 'colorblind') {
                    themeBg = 'bg-sky-50 text-slate-950';
                    cardClass = 'bg-white border-2 border-sky-200 shadow-sm rounded-2xl';
                    textMuted = 'text-slate-600';
                    textPrimary = 'text-sky-700';
                    brandGradient = 'from-sky-700 to-orange-600';
                    activeTabBg = 'bg-orange-100 text-orange-950';
                    btnClass = 'bg-sky-700 hover:bg-sky-800 text-white';
                }

                return { themeBg, cardClass, textMuted, textPrimary, brandGradient, activeTabBg, btnClass };
            }
        };

        window.CC = {
            init: async () => {
                state.assignments = Store.getAssignments();
                state.submissions = Store.getSubmissions();
                
                state.allUsers = await Store.getAccounts();
                
                const email = Store.getSession();
                if (email) {
                    const matched = state.allUsers.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (matched) {
                        state.currentEmail = email;
                        state.profile = matched.profile;
                        state.userRole = matched.role;
                        state.authState = 'app';
                    }
                }
                CC.render();
            },
            
            render: () => {
                const root = document.getElementById('root');
                const bodyRoot = document.getElementById('bodyRoot');
                const th = ThemeEngine.getClasses();
                
                bodyRoot.className = th.themeBg;
                
                let fontMultiplier = '100%';
                if (state.a11y.fontSize === 'large') fontMultiplier = '115%';
                if (state.a11y.fontSize === 'xl') fontMultiplier = '130%';
                document.documentElement.style.setProperty('--font-multiplier', fontMultiplier);

                if (state.authState === 'login' || state.authState === 'signup') {
                    root.innerHTML = Renderers.Auth();
                } else {
                    root.innerHTML = `
                        ${Renderers.Sidebar()}
                        <main class="flex-1 ${state.activeTab === 'spaces' ? 'overflow-hidden flex flex-col' : 'overflow-y-auto'} bg-transparent">
                            ${Renderers.ActiveTab()}
                        </main>
                        ${Renderers.Modals()}
                    `;
                }
            },

            setAuthState: (v) => { state.authState = v; state.authForm.errorMsg = ''; state.authForm.successMsg = ''; CC.render(); },
            setTab: (t) => { state.activeTab = t; CC.render(); },
            setModal: (m) => { state.modal = m; CC.render(); },
            setInteractionPref: (p) => { state.interactionPref = p; CC.render(); },
            
            toggleAuthInterest: (interest) => {
                const idx = state.authForm.selectedInterests.indexOf(interest);
                if (idx === -1) state.authForm.selectedInterests.push(interest);
                else state.authForm.selectedInterests.splice(idx, 1);
                CC.render();
            },
            
            handleAuthSubmit: async (e) => {
                e.preventDefault();
                state.authForm.errorMsg = '';
                const email = document.getElementById('authEmail').value;
                const password = document.getElementById('authPassword').value;
                
                if(!email || !password) return;
                const accounts = await Store.getAccounts();

                if (state.authState === 'login') {
                    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (!acc) {
                        state.authForm.errorMsg = 'No registered account found. Sign Up first!';
                        CC.render(); return;
                    }
                    if (acc.password !== password) {
                        state.authForm.errorMsg = 'Invalid password.';
                        CC.render(); return;
                    }
                    state.currentEmail = email; Store.setSession(email); state.profile = acc.profile; state.userRole = acc.role; state.authState = 'app'; state.activeTab = 'home'; CC.render();
                } else {
                    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (acc) { state.authForm.errorMsg = 'Email already in use.'; CC.render(); return; }
                    
                    const name = document.getElementById('authName').value || 'Student Guide';
                    const role = document.getElementById('authRole').value;
                    const studentType = document.getElementById('authStudentType')?.value || 'Local Guide';
                    const school = document.getElementById('authSchool').value;
                    const course = document.getElementById('authCourse').value;
                    const year = document.getElementById('authYear').value;
                    const avatar = document.getElementById('authAvatar').value || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150';

                    const newProfile = {
                        name, displayName: name, school, eduLevel: role === 'student' ? 'Diploma' : 'Faculty',
                        degree: course, year, interests: state.authForm.selectedInterests.length ? state.authForm.selectedInterests : ['Coding'],
                        role: role === 'student' ? studentType : 'Local Guide', achievementLevel: 'Lvl 1 Rookie', xp: 120, avatar,
                        studyTime: 'Weeknights 7-10PM', studyLocation: 'Campus Library'
                    };

                    const newAccount = { email, password, profile: newProfile, role, id: Date.now() };
                    await Store.createAccount(newAccount);
                    
                    state.authForm.successMsg = 'Account configured! Loading...';
                    CC.render();
                    
                    setTimeout(async () => {
                        state.allUsers = await Store.getAccounts();
                        state.currentEmail = email; Store.setSession(email); state.profile = newProfile; state.userRole = role; state.authState = 'app'; state.activeTab = 'home'; CC.render();
                    }, 1000);
                }
            },
            logout: () => { Store.clearSession(); state.authState = 'login'; state.userRole = null; state.profile = null; CC.render(); },
            addXP: (pts) => {
                state.profile.xp += pts;
                if(state.profile.xp >= 150 && state.profile.xp < 300) state.profile.achievementLevel = "Lvl 2 Advanced Learner";
                if(state.profile.xp >= 300) state.profile.achievementLevel = "Lvl 3 Active Contributor";
            },

            connectFilterUpdate: () => {
                state.connectTab.search = document.getElementById('filterSearch').value;
                state.connectTab.school = document.getElementById('filterSchool').value;
                state.connectTab.course = document.getElementById('filterCourse').value;
                state.connectTab.role = document.getElementById('filterRole').value;
                state.connectTab.interest = document.getElementById('filterInterest').value;
                CC.render();
            },
            
            connectBuddy: (id) => {
                if(!state.connectedUserIds.includes(id)) {
                    state.connectedUserIds.push(id);
                    const acc = state.allUsers.find(u => u.id === id);
                    if(acc) state.friends.push(acc.profile);
                    CC.render();
                }
            },

            joinSpace: (id) => {
                const space = state.spaces.find(s => s.id === id);
                if(space && !space.members.includes(state.profile.name)) {
                    space.members.push(state.profile.name);
                    
                    if(!state.messages[id]) state.messages[id] = [];
                    state.messages[id].push({
                        id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} joined the space. Welcome!`, timestamp: 'Just now'
                    });
                }
                state.spacesTab.activeSpaceId = id;
                CC.render();
            },

            handleCreateSpace: (e) => {
                e.preventDefault();
                const title = document.getElementById('spName').value;
                if(!title) return;
                
                const type = document.getElementById('spType').value;
                const expiresAt = document.getElementById('spExpiry').value || '2026-12-31';

                const spaceId = `sp_${Date.now()}`;
                state.spaces.push({
                    id: spaceId,
                    name: title.toLowerCase().replace(/\s+/g, '-'),
                    type: type,
                    description: document.getElementById('spDesc').value,
                    members: [state.profile.name],
                    expiresAt: expiresAt,
                    status: 'active',
                    tags: []
                });
                
                state.modal = null; 
                state.activeTab = 'spaces'; 
                state.spacesTab.activeSpaceId = spaceId; 
                CC.render();
            },

            sendMessage: () => {
                const inp = document.getElementById('chatInput');
                if(!inp || !inp.value.trim()) return;
                
                const ch = state.spacesTab.activeSpaceId;
                if(ch === 'discover') return;

                if(!state.messages[ch]) state.messages[ch] = [];
                
                state.messages[ch].push({
                    id: Date.now(), username: `${state.profile.name} (You)`, avatar: state.profile.avatar, role: state.profile.role, content: inp.value, timestamp: 'Just now'
                });
                inp.value = ''; // clear input
                CC.render();
            },

            selectAssignment: (id) => { state.academicsTab.selectedAssignment = state.assignments.find(a => a.id === id); CC.render(); },
            submitAssignment: (e) => {
                e.preventDefault();
                const sol = document.getElementById('solText').value;
                if(!sol) return;
                
                const assignId = state.academicsTab.selectedAssignment.id;
                state.submissions = state.submissions.filter(s => !(s.assignmentId === assignId && s.studentEmail === state.currentEmail));
                
                state.submissions.push({ assignmentId: assignId, studentEmail: state.currentEmail, studentName: state.profile.name, solutionText: sol, submittedAt: new Date().toLocaleDateString() });
                Store.saveSubmissions(state.submissions);
                
                // Show a toast or modal instead of alert ideally, but for now we reset the view
                state.academicsTab.selectedAssignment = null;
                CC.render();
            },

            // --- Collaboration Hub Logic ---
            toggleCollab: (assignId, role) => {
                const assign = state.assignments.find(a => a.id === assignId);
                if(!assign.collaborators) assign.collaborators = { needHelp: [], canHelp: [], studyBuddies: [] };
                
                // Remove from other lists to avoid being in multiple categories for the same task
                ['needHelp', 'canHelp', 'studyBuddies'].forEach(r => {
                    const idx = assign.collaborators[r].indexOf(state.profile.name);
                    if (idx > -1 && r !== role) assign.collaborators[r].splice(idx, 1);
                });
                
                const list = assign.collaborators[role];
                const idx = list.indexOf(state.profile.name);
                if(idx > -1) list.splice(idx, 1);
                else list.push(state.profile.name);
                
                Store.saveAssignments(state.assignments);
                CC.render();
            },

            updateStudyPrefs: (e) => {
                e.preventDefault();
                state.profile.studyTime = document.getElementById('prefTime').value;
                state.profile.studyLocation = document.getElementById('prefLoc').value;
                state.modal = null;
                CC.render();
            },

            formAssignmentSpace: (assignId) => {
                const assign = state.assignments.find(a => a.id === assignId);
                if(!assign.collaborators) return;
                
                const allCollabs = new Set([...assign.collaborators.needHelp, ...assign.collaborators.canHelp, ...assign.collaborators.studyBuddies]);
                if(!allCollabs.has(state.profile.name)) allCollabs.add(state.profile.name);
                
                const spaceId = `sp_assign_${assignId}`;
                const existing = state.spaces.find(s => s.id === spaceId);
                if(!existing) {
                    state.spaces.push({
                        id: spaceId,
                        name: `collab-${assign.title.substring(0, 10).replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()}`,
                        type: 'module',
                        desc: `Study group for: ${assign.title}`,
                        members: Array.from(allCollabs),
                        expiresAt: assign.dueDate,
                        status: 'active',
                        tags: [assign.course]
                    });
                }
                state.activeTab = 'spaces';
                state.spacesTab.activeSpaceId = spaceId;
                CC.render();
            },

            // --- Exchange Feature Logic ---
            setExchangeFilter: (f) => { state.exchangeTab.filter = f; CC.render(); },
            
            toggleExchangeInterest: (postId) => {
                const post = state.exchangePosts.find(p => p.id === postId);
                if(!post) return;
                
                if (!post.isInterested) {
                    post.isInterested = true;
                    post.interestedCount++;
                    
                    // Automatically create a private space for this exchange if interested
                    const spaceId = `ex-${postId}`;
                    const existing = state.spaces.find(g => g.id === spaceId);
                    if (!existing) {
                        state.spaces.push({
                            id: spaceId,
                            name: `collab-${post.title.substring(0, 10).replace(/\s+/g,'-')}`,
                            type: 'event',
                            desc: `Exchange Discussion: ${post.title}`,
                            members: [state.profile.name, post.authorName],
                            expiresAt: '2026-12-31',
                            status: 'active'
                        });
                        
                        // Add system message
                        if(!state.messages[spaceId]) state.messages[spaceId] = [];
                        state.messages[spaceId].push({
                            id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} expressed interest in the exchange: "${post.title}". Start chatting!`, timestamp: 'Just now'
                        });
                    }
                    
                    // Switch to the newly created space
                    state.activeTab = 'spaces';
                    state.spacesTab.activeSpaceId = spaceId;
                } else {
                    post.isInterested = false;
                    post.interestedCount--;
                }
                CC.render();
            },

            handleCreateExchange: (e) => {
                e.preventDefault();
                const type = document.getElementById('exType').value;
                
                const newPost = {
                    id: Date.now(),
                    authorName: state.profile.name,
                    avatar: state.profile.avatar,
                    title: document.getElementById('exTitle').value,
                    type: type,
                    topic: document.getElementById('exTopic').value,
                    description: document.getElementById('exDesc').value,
                    interestedCount: 0,
                    isInterested: false
                };
                
                if(type === 'session') {
                    newPost.date = document.getElementById('exDate').value;
                    newPost.time = document.getElementById('exTime').value;
                }

                state.exchangePosts.unshift(newPost);
                state.modal = null;
                CC.render();

            setTeacherEditing: (idx) => { state.teacherTab.editingIndex = idx; CC.render(); },
            saveTeacherGrade: (idx) => {
                const grd = document.getElementById(`gradeInp_${idx}`).value;
                const fdb = document.getElementById(`feedInp_${idx}`).value;
                state.submissions[idx].grade = grd; state.submissions[idx].feedback = fdb; Store.saveSubmissions(state.submissions); state.teacherTab.editingIndex = null; CC.render();
            },

            // --- Icebreaker Logic ---
            submitIcebreakerReply: (promptId) => {
                const inp = document.getElementById('ibReplyInp');
                if(!inp || !inp.value.trim()) return;
                const prompt = state.icebreakers.find(p => p.id === promptId);
                prompt.replies.unshift({
                    id: Date.now(), authorName: state.profile.name, avatar: state.profile.avatar, content: inp.value, comments: [], likes: 0
                });
                CC.addXP(15); 
                CC.render();
            },
            toggleCommentInput: (replyId) => {
                state.icebreakerTab.commentingOn = state.icebreakerTab.commentingOn === replyId ? null : replyId;
                CC.render();
            },
            submitIbComment: (replyId) => {
                const inp = document.getElementById(`ibCommentInp_${replyId}`);
                if(!inp || !inp.value.trim()) return;
                state.icebreakers.forEach(p => {
                    const rep = p.replies.find(r => r.id === replyId);
                    if(rep) rep.comments.push({ authorName: state.profile.name, content: inp.value });
                });
                state.icebreakerTab.commentingOn = null;
                CC.addXP(5);
                CC.render();
            },
            likeIbReply: (replyId) => {
                state.icebreakers.forEach(p => {
                    const rep = p.replies.find(r => r.id === replyId);
                    if(rep) rep.likes++;
                });
                CC.render();
            },

            // --- Knowledge Exchange Hub Logic ---
            resourceFilterUpdate: () => {
                state.resourcesTab.search = document.getElementById('resSearch').value;
                state.resourcesTab.topic = document.getElementById('resTopic').value;
                CC.render();
            },
            
            upvoteResource: (id) => {
                const res = state.resourceFiles.find(r => r.id === id);
                if(res) {
                    res.upvotes++;
                    // Automatically award Trusted Helper badge at 10 upvotes (simulated behavior)
                    if(res.upvotes >= 10 && !res.trusted) res.trusted = true;
                }
                CC.render();
            },
            
            requestClarification: (id) => {
                const res = state.resourceFiles.find(r => r.id === id);
                if(!res) return;
                
                // Form a temporary space with the uploader
                const spaceId = `sp_clarify_${id}`;
                const existing = state.spaces.find(s => s.id === spaceId);
                if (!existing) {
                    state.spaces.push({
                        id: spaceId,
                        name: `qna-${res.title.substring(0, 15).replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()}`,
                        type: 'module',
                        desc: `Clarification thread for resource: ${res.title}`,
                        members: [state.profile.name, res.uploader],

                        status: 'active',
                        tags: [res.topic]

                        id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} wants to ask some questions about "${res.title}".`, timestamp: 'Just now'
                    });
                }
                state.activeTab = 'spaces';
                state.spacesTab.activeSpaceId = spaceId;
                CC.render();

                });
                
                state.activeTab = 'spaces';
                state.spacesTab.activeSpaceId = spaceId;
                CC.render();
            },

                                <i class="fa-solid fa-circle-info mt-0.5"></i>
                                <div><b>Earn Trust!</b> Uploading helpful materials and getting upvotes unlocks the <span class="font-bold underline">Trusted Helper</span> badge.</div>
                            </div>
                            
                            <div>
                                <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Document Title</label>
                                <input id="resTitleInp" required type="text" placeholder="e.g. Physics Formula Cheat Sheet" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm font-bold bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Related Subject</label>
                                    <select id="resTopicInp" required class="w-full p-2.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                                        ${AVAILABLE_COURSES.map(c => `<option>${c}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Upload File (Mock)</label>
                                    <div class="w-full p-2.5 border border-slate-200 border-dashed rounded-xl text-xs bg-slate-50 text-slate-500 flex items-center justify-center gap-2 cursor-pointer hover:bg-slate-100">
                                        <i class="fa-solid fa-upload"></i> Browse...
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Summary / Context</label>
                                <textarea id="resDescInp" required placeholder="What does this resource cover? How should students use it?" class="w-full p-3 border border-slate-200 rounded-xl text-xs bg-white h-24 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"></textarea>
                            </div>
                            
                            <div class="flex gap-3 mt-6 pt-4 border-t border-slate-100">
                                <button type="button" onclick="CC.setModal(null)" class="flex-1 py-3 border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition-colors">Cancel</button>
                                <button type="submit" class="flex-1 bg-indigo-600 text-white rounded-xl text-xs font-bold shadow-sm hover:bg-indigo-700 transition-colors">Publish Notes</button>
                            </div>
                        </form>
                    `;
                }

                return `
                <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-3xl shadow-2xl p-7 max-w-lg w-full text-slate-800 max-h-[85vh] overflow-y-auto transform scale-100 transition-transform">
                        ${content}
                    </div>
                </div>`;
            }
        };

        window.onload = () => {
            CC.init();
        };
    </script>
</body>
</html>
