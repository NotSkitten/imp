<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CampusConnect App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8fafc; /* slate-50 */
        }
        
        /* Dynamic Accessibility Overrides */
        :root {
            --font-multiplier: 100%;
        }
        
        .app-root {
            font-size: var(--font-multiplier) !important;
        }
        
        /* High Contrast Helpers */
        body.theme-highcontrast * {
            border-color: #facc15 !important;
        }
        body.theme-highcontrast input, 
        body.theme-highcontrast select, 
        body.theme-highcontrast textarea, 
        body.theme-highcontrast button {
            border-width: 2px !important;
            border-color: #facc15 !important;
        }

        /* Colorblind Safe Helpers (Deuteranopia/Protanopia focus) */
        body.theme-colorblind .bg-indigo-600 { background-color: #005bbb !important; }
        body.theme-colorblind .text-indigo-600 { color: #005bbb !important; }
        body.theme-colorblind .bg-rose-50 { background-color: #fff3cd !important; color: #856404 !important; }
        body.theme-colorblind .text-rose-700 { color: #856404 !important; }
        body.theme-colorblind .bg-emerald-50 { background-color: #d1ecf1 !important; color: #0c5460 !important; }
        
        /* Custom Scrollbar for better UI */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Hide Scrollbar for horizontal mobile nav */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800" id="bodyRoot">

    <div id="root" class="flex flex-col md:flex-row h-screen w-full app-root overflow-hidden">
        <!-- App content injected here -->
    </div>

    <script>
        // Constants & Mock Data
        const AVAILABLE_INTERESTS = ["Coding", "Gaming", "Art", "Anime", "Food", "Sports", "Reading", "Movies", "Music", "Travel", "Photography", "Tech"];
        const AVAILABLE_SCHOOLS = ["Ngee Ann Polytechnic", "Singapore Polytechnic", "Temasek Polytechnic", "Nanyang Polytechnic", "Republic Polytechnic", "National University of Singapore", "Nanyang Technological University", "Singapore Management University"];
        const AVAILABLE_COURSES = ["Computer Science", "Information Technology", "Business Administration", "Design & Media", "Engineering", "Life Sciences", "Accounting"];
        
        const CC_SESSION_KEY  = 'cc_html_session_v2';
        const API_URL = 'https://imp-7jxc.onrender.com'; // Mock API

        // UPGRADED STORE: Handles Render server timeouts natively for GitHub Pages
        const Store = {
            getSession: () => localStorage.getItem(CC_SESSION_KEY),
            setSession: (email) => localStorage.setItem(CC_SESSION_KEY, email),
            clearSession: () => localStorage.removeItem(CC_SESSION_KEY),
            getAccounts: async () => {
                try {
                    // Fail fast (5s) if backend is sleeping so UI doesn't hang
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 5000);
                    
                    const response = await fetch(`${API_URL}/users`, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) throw new Error('Backend responded with error');
                    
                    const data = await response.json();
                    // Keep a fresh local backup
                    localStorage.setItem(CC_SESSION_KEY + '_cache', JSON.stringify(data));
                    return data;
                } catch (e) {
                    console.warn("Backend unavailable (likely sleeping on Render). Falling back to local cache.");
                    const cached = localStorage.getItem(CC_SESSION_KEY + '_cache');
                    return cached ? JSON.parse(cached) : [];
                }
            },
            createAccount: async (acc) => {
                try {
                    await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(acc)
                    });
                } catch (e) {
                    console.warn("Backend unavailable. Account saved to local cache to ensure uninterrupted experience.");
                }
                
                // Immediately save to cache so it works even if backend is offline
                const current = await Store.getAccounts();
                current.push(acc);
                localStorage.setItem(CC_SESSION_KEY + '_cache', JSON.stringify(current));
            }
        };

        // Core State Object
        const state = {
            authState: 'login',
            allUsers: [], 
            userRole: null,
            profile: null,
            currentEmail: '',
            activeTab: 'home',
            a11y: { fontSize: 'normal', theme: 'default', layout: 'standard' },
            interactionPref: 'online', 
            
            authForm: { errorMsg: '', successMsg: '', selectedInterests: [] },

            friends: [
                { id: 'f1', name: "Sarah J.", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", school: "Ngee Ann Polytechnic", year: "Year 2", course: "Computer Science", level: 15, interests: ["Anime", "Coding", "Gaming"], achievementLevel: "Lvl 15 Elite Scholar" }
            ],
            
            events: [
                { id: 'ev1', title: 'Campus Hackathon 2026', date: 'Aug 15, 2026', time: '09:00 AM', location: 'Innovation Block 31', description: 'Join us for a 24-hour coding marathon. Open to all courses!', attendees: 45 },
                { id: 'ev2', title: 'International Food Fest', date: 'Aug 20, 2026', time: '05:00 PM', location: 'Main Plaza', description: 'Experience cuisines from over 20 different countries. Student ID required.', attendees: 120 }
            ],

            networkUsers: [
                { id: 'u101', name: "David L.", role: "International", school: "National University of Singapore", course: "Business", interests: ["Gaming", "Coding"], avatar: "https://i.pravatar.cc/150?u=101" },
                { id: 'u102', name: "Maria S.", role: "Local Guide", school: "Ngee Ann Polytechnic", course: "Design", interests: ["Art", "Food"], avatar: "https://i.pravatar.cc/150?u=102" },
                { id: 'u103', name: "James K.", role: "International", school: "Singapore Polytechnic", course: "Engineering", interests: ["Sports", "Music"], avatar: "https://i.pravatar.cc/150?u=103" },
                { id: 'u104', name: "Wei Chen", role: "Local Guide", school: "Singapore Management University", course: "Accounting", interests: ["Tech", "Reading"], avatar: "https://i.pravatar.cc/150?u=104" }
            ],
            
            spaces: [
                { id: 'sp_cs101', name: 'cs101-lab-help', type: 'study', desc: 'Temporary study group for Week 4 assignments.', members: ['Sarah J.', 'Kenji M.'], expiresAt: '2026-07-20', status: 'active', tags: ['Computer Science'] },
                { id: 'sp_public_np1', name: 'ngee-ann-life', type: 'public', desc: 'General chatter for NP students. Public to all.', members: ['Everyone'], expiresAt: '2099-12-31', status: 'active', tags: ['Public'] },
                { id: 'sp_public_np2', name: 'ngee-ann-shop-updates', type: 'public', desc: 'Official updates from campus shops and events.', members: ['Everyone'], expiresAt: '2099-12-31', status: 'active', tags: ['Public'] },
            ],
            
            studyResources: [
                { 
                    id: 'r1', title: 'CS101 Binary Trees Cheat Sheet', topic: 'Computer Science', type: 'PDF', 
                    uploader: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', 
                    description: 'Visual guide to tree traversals and balancing. I created these notes for the midterms.', 
                    status: { needHelp: false, canHelp: true, buddy: true },
                    schedule: 'Weeknights 7PM-9PM @ Library',
                    upvotes: 42, trusted: true 
                },
                { 
                    id: 'r2', title: 'Macroeconomics Chapter 1-5 Summary', topic: 'Business Administration', type: 'Notes', 
                    uploader: 'Kenji M.', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', 
                    description: 'Simplified breakdowns of supply and demand curves. Im stuck on chapter 4 though!', 
                    status: { needHelp: true, canHelp: false, buddy: true }, 
                    schedule: 'Weekends @ Campus Cafe',
                    upvotes: 8, trusted: false 
                }
            ],
            
            exchangePosts: [
                { id: 101, authorName: "Sarah J.", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", title: "Teach me basic Japanese! 🇯🇵", type: "request", topic: "Language", description: "Going on exchange to Tokyo next semester. Need to survive ordering food and asking for directions!", interestedCount: 3, isInterested: false },
                { id: 102, authorName: "Kenji M.", avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150", title: "Singlish 101 Survival Guide 🇸🇬", type: "offer", topic: "Culture", description: "I've mastered the art of ordering kopi. Let me teach you the difference between 'Kopi C' and 'Kopi O Kosong'!", interestedCount: 8, isInterested: false },
                { id: 103, authorName: "Elena R.", avatar: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150", title: "Spanish Tapas Night 🇪🇸", type: "session", topic: "Food", description: "Hosting a short cultural sharing session in Hall 4 to share authentic tapas recipes and practice conversational Spanish.", interestedCount: 5, date: "2026-07-20", time: "18:00", isInterested: false }
            ],
            
            communityFeed: [
                {
                    id: 'ib_1', date: 'Daily Icebreaker', prompt: "What's a food from your culture everyone must try at least once?",
                    replies: [
                        { id: 'r1', authorName: 'Kenji M.', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', content: 'Authentic Takoyaki! The ones at the local night markets here are good, but nothing beats the street food in Osaka.', likes: 12, comments: [] },
                        { id: 'r2', authorName: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', content: 'Kaya Toast with half-boiled eggs. It is the ultimate breakfast comfort food. Dip the toast in the egg!', likes: 24, comments: [{ authorName: 'Kenji M.', content: 'Tried this yesterday, it was amazing!!' }] }
                    ]
                },
                {
                    id: 'ib_2', date: 'Daily Icebreaker', prompt: "Share a hidden study spot on campus.",
                    replies: [
                        { id: 'r3', authorName: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', content: 'Block 51, Level 4. There are these tucked-away benches with power plugs. 🤫', likes: 8, comments: [] }
                    ]
                }
            ],
            
            modal: null, 
            activeEventData: null,
            
            connectionsTab: { filterRole: 'All', interestFilters: {} },
            spacesTab: { activeSpaceId: 'discover' },
            exchangeTab: { filter: 'all' },
            studySpaceTab: { search: '', topic: 'All' },
            communityTab: { activePromptId: 'ib_1', commentingOn: null },
            
            messages: {
                'sp_cs101': [
                    { id: 1, username: 'Sarah J.', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150', role: 'Local Guide', content: 'Anyone stuck on the binary tree insertion logic? 😭', timestamp: 'Today at 3:15 PM' }
                ]
            }
        };

        const ThemeEngine = {
            getClasses: () => {
                let themeBg = 'bg-slate-50 text-slate-800';
                let cardClass = 'bg-white border border-slate-200 shadow-sm rounded-2xl';
                let textMuted = 'text-slate-500';
                let textPrimary = 'text-indigo-600';
                let brandGradient = 'from-indigo-600 to-violet-600';
                let activeTabBg = 'bg-indigo-50 text-indigo-700';
                let btnClass = 'bg-indigo-600 hover:bg-indigo-700 text-white';

                if (state.a11y.theme === 'highcontrast') {
                    themeBg = 'bg-slate-950 text-white theme-highcontrast';
                    cardClass = 'bg-slate-900 border-2 border-yellow-400 shadow-none rounded-2xl';
                    textMuted = 'text-slate-300';
                    textPrimary = 'text-yellow-400';
                    brandGradient = 'from-slate-900 to-slate-800';
                    activeTabBg = 'bg-yellow-400 text-slate-950';
                    btnClass = 'bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-bold border-2 border-white';
                } else if (state.a11y.theme === 'colorblind') {
                    themeBg = 'bg-slate-50 text-slate-800 theme-colorblind';
                }
                return { themeBg, cardClass, textMuted, textPrimary, brandGradient, activeTabBg, btnClass };
            }
        };

        window.CC = {
            init: async () => {
                state.allUsers = await Store.getAccounts();
                const email = Store.getSession();
                if (email) {
                    const matched = state.allUsers.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (matched) {
                        state.currentEmail = email;
                        state.profile = matched.profile;
                        state.userRole = matched.role;
                        state.authState = 'app';
                    }
                }
                CC.render();
            },
            
            render: () => {
                const root = document.getElementById('root');
                const bodyRoot = document.getElementById('bodyRoot');
                const th = ThemeEngine.getClasses();
                
                bodyRoot.className = th.themeBg;
                
                let fontMultiplier = '100%';
                if (state.a11y.fontSize === 'large') fontMultiplier = '115%';
                if (state.a11y.fontSize === 'xl') fontMultiplier = '130%';
                document.documentElement.style.setProperty('--font-multiplier', fontMultiplier);

                if (state.authState === 'login' || state.authState === 'signup') {
                    root.innerHTML = Renderers.Auth();
                } else {
                    root.innerHTML = `
                        <!-- Main Content Stack (Fills space above nav on mobile, Right side on Desktop) -->
                        <main class="flex-1 overflow-hidden relative order-1 md:order-2 w-full bg-slate-50 flex flex-col">
                            <div class="w-full ${state.activeTab === 'spaces' || state.activeTab === 'community' ? 'h-full flex flex-col overflow-hidden' : 'h-full overflow-y-auto'}">
                                ${Renderers.ActiveTab()}
                            </div>
                        </main>
                        <!-- Navigation Stack (Bottom on mobile, Left on Desktop) -->
                        <div class="order-2 md:order-1 shrink-0 w-full md:w-auto z-40 bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.05)] md:shadow-none">
                            ${Renderers.Sidebar()}
                        </div>
                        ${Renderers.Modals()}
                    `;
                }
            },

            setAuthState: (v) => { state.authState = v; state.authForm.errorMsg = ''; state.authForm.successMsg = ''; CC.render(); },
            setTab: (t) => { state.activeTab = t; CC.render(); },
            setModal: (m, data=null) => { state.modal = m; state.activeEventData = data; CC.render(); },
            
            updateSetting: (key, val) => { state.a11y[key] = val; CC.render(); },
            toggleInteractionPref: () => { state.interactionPref = state.interactionPref === 'online' ? 'both' : 'online'; CC.render(); },
            
            handleCreateEventSubmit: (e) => {
                e.preventDefault();
                const newEvent = {
                    id: 'ev_' + Date.now(), title: document.getElementById('evTitle').value, date: document.getElementById('evDate').value,
                    time: document.getElementById('evTime').value, location: document.getElementById('evLoc').value, description: document.getElementById('evDesc').value, attendees: 1
                };
                state.events.unshift(newEvent); state.modal = null; CC.render();
            },

            updateConnectionFilter: () => { state.connectionsTab.filterRole = document.getElementById('connRole').value; CC.render(); },
            handleInterestFilterClick: (e, interest) => {
                e.preventDefault();
                if (e.type === 'click') {
                    if (window.clickTimer) clearTimeout(window.clickTimer);
                    window.clickTimer = setTimeout(() => {
                        const current = state.connectionsTab.interestFilters[interest] || 0;
                        state.connectionsTab.interestFilters[interest] = current === 1 ? 0 : 1;
                        CC.render();
                    }, 250);
                } else if (e.type === 'dblclick') {
                    if (window.clickTimer) clearTimeout(window.clickTimer);
                    const current = state.connectionsTab.interestFilters[interest] || 0;
                    state.connectionsTab.interestFilters[interest] = current === -1 ? 0 : -1;
                    CC.render();
                }
            },
            connectUser: (userId) => {
                const user = state.networkUsers.find(u => u.id === userId);
                if (user && !state.friends.find(f => f.id === userId)) { state.friends.push({ ...user, level: 1, achievementLevel: "New Connect" }); }
                CC.render();
            },
            
            handleCreateGroupChat: (e) => {
                e.preventDefault();
                const title = document.getElementById('gcTitle').value;
                const checkboxes = document.querySelectorAll('input[name="gcFriends"]:checked');
                const selectedNames = Array.from(checkboxes).map(cb => cb.value);
                if (selectedNames.length === 0) return;

                const spaceId = `sp_gc_${Date.now()}`;
                state.spaces.push({
                    id: spaceId, name: title.replace(/\s+/g,'-').toLowerCase(), type: 'social', desc: 'Private Group Chat', members: [state.profile.name, ...selectedNames], expiresAt: '2027-01-01', status: 'active', tags: ['Social']
                });
                state.messages[spaceId] = [{ id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} created the group chat. Say hi!`, timestamp: 'Just now' }];
                state.modal = null; state.activeTab = 'spaces'; state.spacesTab.activeSpaceId = spaceId; CC.render();
            },

            toggleAuthInterest: (e, interest) => {
                const idx = state.authForm.selectedInterests.indexOf(interest);
                const btn = e.currentTarget;
                if (idx === -1) {
                    state.authForm.selectedInterests.push(interest);
                    btn.classList.remove('bg-slate-50', 'text-slate-600', 'border-slate-200', 'hover:bg-slate-100');
                    btn.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                } else {
                    state.authForm.selectedInterests.splice(idx, 1);
                    btn.classList.add('bg-slate-50', 'text-slate-600', 'border-slate-200', 'hover:bg-slate-100');
                    btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                }
            },
            
            handleAuthSubmit: async (e) => {
                e.preventDefault();
                state.authForm.errorMsg = '';
                const emailEl = document.getElementById('authEmail');
                const passwordEl = document.getElementById('authPassword');
                if(!emailEl || !passwordEl) return;
                const email = emailEl.value; const password = passwordEl.value;
                if(!email || !password) return;
                
                const accounts = await Store.getAccounts();

                if (state.authState === 'login') {
                    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (!acc) { state.authForm.errorMsg = 'No registered account found. Sign Up first!'; CC.render(); return; }
                    if (acc.password !== password) { state.authForm.errorMsg = 'Invalid password.'; CC.render(); return; }
                    state.currentEmail = email; Store.setSession(email); state.profile = acc.profile; state.userRole = acc.role; state.authState = 'app'; state.activeTab = 'home'; CC.render();
                } else {
                    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
                    if (acc) { state.authForm.errorMsg = 'Email already in use.'; CC.render(); return; }
                    
                    const name = document.getElementById('authName')?.value || 'Student Guide';
                    const role = document.getElementById('authRole')?.value || 'student';
                    const studentType = document.getElementById('authStudentType')?.value || 'Local Guide';
                    const school = document.getElementById('authSchool')?.value || AVAILABLE_SCHOOLS[0];
                    const course = document.getElementById('authCourse')?.value || AVAILABLE_COURSES[0];
                    const year = document.getElementById('authYear')?.value || 'Year 1';
                    
                    const newProfile = {
                        name, displayName: name, school, eduLevel: role === 'student' ? 'Diploma' : 'Faculty', degree: course, year, interests: state.authForm.selectedInterests.length ? state.authForm.selectedInterests : ['Coding'],
                        role: role === 'student' ? studentType : 'Local Guide', achievementLevel: 'Lvl 1 Rookie', xp: 120, avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150',
                        studyTime: 'Weeknights 7-10PM', studyLocation: 'Campus Library'
                    };

                    const newAccount = { email, password, profile: newProfile, role, id: Date.now() };
                    
                    // Uses robust Store to handle sleeping backend gracefully
                    await Store.createAccount(newAccount);
                    state.authForm.successMsg = 'Account configured! Loading...'; CC.render();
                    
                    setTimeout(async () => {
                        state.allUsers = await Store.getAccounts();
                        state.currentEmail = email; Store.setSession(email); state.profile = newProfile; state.userRole = role; state.authState = 'app'; state.activeTab = 'home'; CC.render();
                    }, 1000);
                }
            },
            
            logout: () => { Store.clearSession(); state.authState = 'login'; state.userRole = null; state.profile = null; CC.render(); },
            
            sendMessage: () => {
                const inp = document.getElementById('chatInput');
                if(!inp || !inp.value.trim()) return;
                const ch = state.spacesTab.activeSpaceId;
                if(!state.messages[ch]) state.messages[ch] = [];
                state.messages[ch].push({ id: Date.now(), username: `${state.profile.name} (You)`, avatar: state.profile.avatar, role: state.profile.role, content: inp.value, timestamp: 'Just now' });
                inp.value = ''; CC.render();
                
                // Auto scroll to bottom
                setTimeout(() => {
                    const chatContainer = document.getElementById('chatMessagesContainer');
                    if(chatContainer) chatContainer.scrollTop = chatContainer.scrollHeight;
                }, 50);
            },

            setExchangeFilter: (f) => { state.exchangeTab.filter = f; CC.render(); },
            toggleExchangeInterest: (postId) => {
                const post = state.exchangePosts.find(p => p.id === postId);
                if(!post) return;
                
                if (!post.isInterested) {
                    post.isInterested = true; post.interestedCount++;
                    const spaceId = `ex-${postId}`;
                    if (!state.spaces.find(g => g.id === spaceId)) {
                        state.spaces.push({ id: spaceId, name: `culture-${post.title.substring(0, 10).replace(/\s+/g,'-')}`, type: 'culture', desc: `Language & Culture Exchange: ${post.title}`, members: [state.profile.name, post.authorName], expiresAt: '2026-12-31', status: 'active' });
                        if(!state.messages[spaceId]) state.messages[spaceId] = [];
                        state.messages[spaceId].push({ id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} expressed interest in: "${post.title}". Start chatting online first! <br><br>💡 <b>Tip:</b> Once you're comfortable, we suggest meeting up to try local food together, attending a cultural event, or studying together!`, timestamp: 'Just now' });
                    }
                    state.activeTab = 'spaces'; state.spacesTab.activeSpaceId = spaceId;
                } else {
                    post.isInterested = false; post.interestedCount--;
                }
                CC.render();
            },

            handleCreateExchange: (e) => {
                e.preventDefault();
                const type = document.getElementById('exType').value;
                const newPost = {
                    id: Date.now(), authorName: state.profile.name, avatar: state.profile.avatar, title: document.getElementById('exTitle').value, type: type, topic: document.getElementById('exTopic').value, description: document.getElementById('exDesc').value, interestedCount: 0, isInterested: false
                };
                if(type === 'session') { newPost.date = document.getElementById('exDate').value; newPost.time = document.getElementById('exTime').value; }
                state.exchangePosts.unshift(newPost); state.modal = null; CC.render();
            },

            studySpaceFilterUpdate: () => { state.studySpaceTab.search = document.getElementById('ssSearch').value; state.studySpaceTab.topic = document.getElementById('ssTopic').value; CC.render(); },
            
            requestClarification: (id) => {
                const res = state.studyResources.find(r => r.id === id);
                const spaceId = `sp_clarify_${id}`;
                if (!state.spaces.find(s => s.id === spaceId)) {
                    state.spaces.push({ id: spaceId, name: `qna-${res.title.substring(0, 15).replace(/[^a-zA-Z0-9]/g,'-').toLowerCase()}`, type: 'study', desc: `Clarification thread for resource: ${res.title}`, members: [state.profile.name, res.uploader], expiresAt: '2026-12-31', status: 'active', tags: [res.topic] });
                    if(!state.messages[spaceId]) state.messages[spaceId] = [];
                    state.messages[spaceId].push({ id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} requested clarification on notes: "${res.title}". If multiple students join, consider forming a revision group!`, timestamp: 'Just now' });
                }
                state.activeTab = 'spaces'; state.spacesTab.activeSpaceId = spaceId; CC.render();
            },

                state.messages[spaceId].push({ id: Date.now(), username: 'System', avatar: 'https://placehold.co/100x100/indigo/white?text=SYS', role: 'Bot', content: `${state.profile.name} wants to organise a revision session! Discuss here if you want to meet online or schedule an in-person session based on preferred times.`, timestamp: 'Just now' });
                state.activeTab = 'spaces'; state.spacesTab.activeSpaceId = spaceId; CC.render();

            handleUploadResource: (e) => {
                e.preventDefault();
                state.studyResources.unshift({

                const inp = document.getElementById('feedReplyInp');

                prompt.replies.unshift({ id: Date.now(), authorName: state.profile.name, avatar: state.profile.avatar, content: inp.value, comments: [], likes: 0 });

                                    <label class="text-xs flex items-center gap-1.5"><input type="checkbox" id="statNeed" class="w-4 h-4 rounded"> Need Help</label>
                                    <label class="text-xs flex items-center gap-1.5"><input type="checkbox" id="statCan" class="w-4 h-4 rounded"> Can Help</label>
                                    <label class="text-xs flex items-center gap-1.5"><input type="checkbox" id="statBuddy" class="w-4 h-4 rounded"> Study Buddy</label>
                                </div>
                                <div class="grid grid-cols-2 gap-3 mt-2">
                                    <div><label class="block text-[10px] text-slate-500">Pref. Time</label><input id="prefTime" value="${state.profile.studyTime}" class="w-full p-2.5 md:p-2 border rounded-lg text-xs"></div>
                                    <div><label class="block text-[10px] text-slate-500">Pref. Location</label><input id="prefLoc" value="${state.profile.studyLocation}" class="w-full p-2.5 md:p-2 border rounded-lg text-xs"></div>
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 md:py-3 rounded-xl text-xs font-bold">Upload</button>
                        </form>
                    `;
                } else if (state.modal === 'createEvent') {
                    content = `
                        <div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-3">
                            <h3 class="text-base md:text-lg font-black text-slate-800">Create Event</h3>
                            <button onclick="CC.setModal(null)"><i class="fa-solid fa-xmark text-lg p-1"></i></button>
                        </div>
                        <form onsubmit="CC.handleCreateEventSubmit(event)" class="space-y-4">
                            <div><label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Event Title</label><input id="evTitle" required type="text" class="w-full p-2.5 md:p-2 border rounded-xl text-sm font-bold"></div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Date</label><input id="evDate" required type="text" placeholder="e.g. Sep 1, 2026" class="w-full p-2.5 md:p-2 border rounded-xl text-xs"></div>
                                <div><label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Time</label><input id="evTime" required type="text" placeholder="e.g. 10:00 AM" class="w-full p-2.5 md:p-2 border rounded-xl text-xs"></div>
                            </div>
                            <div><label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Location</label><input id="evLoc" required type="text" class="w-full p-2.5 md:p-2 border rounded-xl text-sm font-bold"></div>
                            <div><label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Description</label><textarea id="evDesc" required class="w-full p-3 border rounded-xl text-xs h-20"></textarea></div>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 md:py-3 rounded-xl text-xs font-bold">Publish Event</button>
                        </form>
                    `;
                } else if (state.modal === 'eventDetails') {
                    const ev = state.events.find(e => e.id === state.activeEventData);
                    if(ev) {
                        content = `
                            <div class="flex justify-between items-start mb-5 border-b border-slate-100 pb-4">
                                <div>
                                    <h3 class="text-lg md:text-xl font-black text-slate-800">${ev.title}</h3>
                                    <p class="text-xs md:text-sm text-indigo-600 font-bold mt-1"><i class="fa-solid fa-users mr-1"></i> ${ev.attendees} Attending</p>
                                </div>
                                <button onclick="CC.setModal(null)"><i class="fa-solid fa-xmark text-slate-400 text-xl p-1"></i></button>
                            </div>
                            <div class="space-y-4">
                                <div class="bg-slate-50 p-4 rounded-xl flex flex-col gap-2">
                                    <div class="flex items-center gap-2 text-xs md:text-sm text-slate-700"><i class="fa-regular fa-calendar w-5 text-center text-slate-400"></i> <b>${ev.date}</b> at <b>${ev.time}</b></div>
                                    <div class="flex items-center gap-2 text-xs md:text-sm text-slate-700"><i class="fa-solid fa-location-dot w-5 text-center text-slate-400"></i> <b>${ev.location}</b></div>
                                </div>
                                <div>
                                    <h4 class="text-[11px] md:text-xs font-bold text-slate-500 uppercase mb-2">About Event</h4>
                                    <p class="text-xs md:text-sm text-slate-700">${ev.description}</p>
                                </div>
                                <button onclick="CC.setModal(null)" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 md:py-3 rounded-xl text-xs md:text-sm font-bold mt-4 shadow-sm transition-colors">Join Event</button>
                            </div>
                        `;
                    }
                } else if (state.modal === 'createGroupChat') {
                    content = `
                        <div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-3">
                            <h3 class="text-base md:text-lg font-black text-slate-800">Create Group Chat</h3>
                            <button onclick="CC.setModal(null)"><i class="fa-solid fa-xmark text-lg p-1"></i></button>
                        </div>
                        <form onsubmit="CC.handleCreateGroupChat(event)" class="space-y-4">
                            <div><label class="block text-[11px] font-bold text-slate-700 uppercase mb-1">Group Name</label><input id="gcTitle" required type="text" placeholder="e.g. Weekend Hackers" class="w-full p-2.5 md:p-2 border rounded-xl text-sm font-bold"></div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-700 uppercase mb-2">Select Friends</label>
                                <div class="max-h-48 overflow-y-auto space-y-2 border border-slate-200 rounded-xl p-2 bg-slate-50">
                                    ${state.friends.length === 0 ? '<p class="text-xs text-slate-500 p-2">No friends added yet. Connect with people first!</p>' : ''}
                                    ${state.friends.map(f => `
                                        <label class="flex items-center gap-3 p-2 md:p-2 hover:bg-white rounded-lg cursor-pointer">
                                            <input type="checkbox" name="gcFriends" value="${f.name}" class="w-5 h-5 md:w-4 md:h-4 text-indigo-600 rounded">
                                            <img src="${f.avatar}" class="w-8 h-8 rounded-full border border-slate-200">
                                            <span class="text-xs md:text-sm font-bold text-slate-700">${f.name}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 md:py-3 rounded-xl text-xs font-bold">Start Chat</button>
                        </form>
                    `;
                }

                return `
                <div class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4 md:p-4 backdrop-blur-sm">
                    <div class="bg-white rounded-3xl p-5 md:p-7 w-[95%] md:max-w-lg md:w-full text-slate-800 max-h-[90vh] overflow-y-auto shadow-2xl">
                        ${content}
                    </div>
                </div>`;
            }
        };

        window.onload = () => { CC.init(); };
    </script>
</body>
</html>
